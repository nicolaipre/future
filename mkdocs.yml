site_name: Future
site_description: Minimal, decorator-free ASGI framework for Python
site_author: Future
site_url: https://nicolaipre.github.io/future-framework/

repo_name: nicolaipre/future-framework
repo_url: https://github.com/nicolaipre/future-framework
edit_uri: edit/master/docs/

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - python
    - bash
    - yaml
    - toml

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - Framework:
    - Controllers: controllers.md
    - Request: request.md
    - Response: response.md
    - Routing: routing.md
    - Middleware: middleware.md
    - WebSockets: websockets.md
    - Lifespan: lifespan.md
    - Tasks: tasks.md
    - Configuration: configuration.md
    - Models: models.md
    - Database: database.md
    - Docker: docker.md
    - OpenAPI: openapi.md
    - CLI: cli.md
  - Gaps: gaps.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
