site_name: Future Framework
site_description: A minimalist, decorator-free ASGI web framework for Python
site_author: Future Framework Team

repo_name: future
repo_url: https://github.com/nicolaipre/future
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quick-start.md
  - Getting started: getting-started.md
  - HTTP:
    - Request, Response, Middleware: http.md
    - Routing: routing.md
  - Database: database.md
  - OpenAPI: openapi.md
  - Lifespan and tasks: lifespan-tasks.md
  - CLI: cli.md
  - Quick reference: quick-reference.md
  - Examples: examples.md
  - Gaps and roadmap: gaps.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nicolaipre/future
